name: CI Tests & Build

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['*']

jobs:
    test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: localia
                    POSTGRES_PASSWORD: localia_dev_password
                    POSTGRES_DB: localia_dev
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run Tests
              run: npm test
              env:
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_USER: localia
                  DB_PASSWORD: localia_dev_password
                  DB_NAME: localia_dev

    build:
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
              env:
                  NODE_VERSION: '20'
